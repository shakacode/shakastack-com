    <text x="86" y="44" font-family="system-ui, sans-serif" font-size="40" font-weight="800" letter-spacing="0" fill="#ffffff">ShakaStack</text>
  </g>

  <text x="96" y="300" font-family="system-ui, sans-serif" font-size="78" font-weight="800" letter-spacing="0" fill="#ffffff">Ship modern React in Rails -</text>
  <text x="96" y="392" font-family="system-ui, sans-serif" font-size="78" font-weight="800" letter-spacing="0"><tspan fill="url(#fast)">fast</tspan><tspan fill="#ffffff">, and prove it.</tspan></text>

  <text x="96" y="470" font-family="system-ui, sans-serif" font-size="30" fill="#f1e9dd" opacity="0.88">Four phases, four OSS projects + ShakaPerf by artifact.</text>

