<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="dusk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#181d27"/>
      <stop offset="0.42" stop-color="#3a221d"/>
      <stop offset="0.8" stop-color="#c8311b"/>
      <stop offset="1.12" stop-color="#e8a04f"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.88" cy="0.1" r="0.5">
      <stop offset="0" stop-color="#f4c878" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#e08a4a" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#e08a4a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a8241a"/>
      <stop offset="1" stop-color="#e89a4f"/>
    </linearGradient>
    <linearGradient id="fast" x1="0" y1="0" x2="1" y2="0">
